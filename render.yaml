services:
  - type: web
    name: fastclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: FASTCLAW_STATE_DIR
        value: /data/.fastclaw
      - key: FASTCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: FASTCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: fastclaw-data
      mountPath: /data
      sizeGB: 1
