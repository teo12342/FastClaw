services:
  fastclaw-gateway:
    image: ${FASTCLAW_IMAGE:-fastclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      FASTCLAW_GATEWAY_TOKEN: ${FASTCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${FASTCLAW_CONFIG_DIR}:/home/node/.fastclaw
      - ${FASTCLAW_WORKSPACE_DIR}:/home/node/.fastclaw/workspace
    ports:
      - "${FASTCLAW_GATEWAY_PORT:-18789}:18789"
      - "${FASTCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${FASTCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  fastclaw-cli:
    image: ${FASTCLAW_IMAGE:-fastclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      FASTCLAW_GATEWAY_TOKEN: ${FASTCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${FASTCLAW_CONFIG_DIR}:/home/node/.fastclaw
      - ${FASTCLAW_WORKSPACE_DIR}:/home/node/.fastclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
